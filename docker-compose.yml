version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: leadfinder_backend
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/app
    restart: always

  frontend:
    build:
      context: ./web-app
    container_name: leadfinder_frontend
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

volumes:
  backend_data:
